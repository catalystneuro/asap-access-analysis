name: Build & deploy dashboard

# Rebuilds index.html from the latest DANDI access-summaries + DANDI API data
# and publishes it to GitHub Pages. Runs nightly, on every push to main, and
# on demand.

on:
  push:
    branches: [main]
  schedule:
    # 07:30 UTC nightly — after access-summaries publishes its daily tarball.
    - cron: "30 7 * * *"
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build index.html (fresh data)
        run: python build.py --download

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
